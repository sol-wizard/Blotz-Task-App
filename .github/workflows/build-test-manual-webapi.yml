name: Run Manual Tests

on:
  workflow_dispatch:

jobs:
  manual-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0"

      - name: Install API dependencies
        run: dotnet restore
        working-directory: ./blotztask-api

      - name: Install test dependencies
        run: dotnet restore
        working-directory: ./blotztask-test

      - name: Build the API project
        run: dotnet build --configuration Release --no-restore
        working-directory: ./blotztask-api

      - name: Build the test project
        run: dotnet build --configuration Release --no-restore
        working-directory: ./blotztask-test

      - name: Run Manual Tests
        run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category=Manual" --logger "trx;LogFileName=test_results.trx" --results-directory ./TestResults
        working-directory: ./blotztask-test
        env:
          AzureOpenAI__Endpoint: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AzureOpenAI__AiModels__TaskGeneration__DeploymentId: ${{ secrets.AZURE_OPENAI_TASK_GENERATION_DEPLOYMENT_ID }}
