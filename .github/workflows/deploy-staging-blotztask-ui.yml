name: Staging - Build and deploy Next.js app to Azure Web App

on:
  push:
    branches:
      - fix-frontend-staging-deploy  
  workflow_dispatch:

env:
  APPLICATION_PUBLISH_PROFILE: ${{ secrets.APP_PUBLISH_PROFILE }}
  WEBAPP_NAME: "blotztask-ui"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Build and prepare standalone output
        working-directory: ./blotztask-ui
        run: |
          npm install
          npm run build
      
          # Ensure the final structure exists
          mkdir -p build/standalone/.next/static
      
          # Move static assets (if any)
          if [ -d build/static ]; then
            cp -r build/static/* build/standalone/.next/static/
          fi
      
          # Move public folder (if exists)
          if [ -d public ]; then
            cp -r public build/standalone/
          fi

      - name: "Deploy to Azure Web App"
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: wapp-blotztask-ui-staging
          publish-profile: ${{ env.APPLICATION_PUBLISH_PROFILE }}
          package: ./blotztask-ui/build/standalone