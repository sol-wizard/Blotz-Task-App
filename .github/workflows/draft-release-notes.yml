name: Draft Release Notes (AI)

# On-demand button: drafts user-facing "What's New" notes from the PRs merged
# since the last release, using GitHub Models (no API key — uses the built-in
# token). Reads each PR's title + description, filters out internal/technical
# work, and writes friendly App Store / Play "What's New" copy to the run
# summary for you to copy. Builds/submits/ships nothing.

on:
  workflow_dispatch:
    inputs:
      model:
        description: "GitHub Models model to use"
        required: false
        default: "openai/gpt-4o"

permissions:
  contents: read
  models: read

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect PRs merged since the last release
        id: collect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"

          # Baseline = the commit the latest published release points at.
          PREV_TAG=$(gh api "repos/$REPO/releases/latest" --jq '.tag_name' 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            SINCE=$(gh api "repos/$REPO/commits/$PREV_TAG" --jq '.commit.committer.date')
          else
            SINCE="1970-01-01T00:00:00Z"
          fi
          echo "Baseline: ${PREV_TAG:-none} ($SINCE)"

          # Title + first 800 chars of each PR body, merged after the baseline.
          gh pr list --repo "$REPO" --state merged --base main --limit 100 \
            --json number,title,body,mergedAt \
            --jq "[.[] | select(.mergedAt > \"$SINCE\")] | sort_by(.mergedAt)
                  | .[] | \"#\(.number) \(.title)\n\(.body // \"\" | .[0:800])\n---\"" > prs.txt

          echo "since=$SINCE" >> "$GITHUB_OUTPUT"
          echo "prev_tag=${PREV_TAG:-none}" >> "$GITHUB_OUTPUT"
          echo "Collected $(grep -c '^---$' prs.txt) PRs."

      - name: Summarize with GitHub Models
        id: ai
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SYSTEM='You write user-facing mobile app release notes ("What'\''s New") for the BlotzTask app (an ADHD-friendly task manager). You are given a list of merged pull requests (title + description). Produce a short, friendly changelog for end users to read in the App Store / Google Play. RULES: only include changes a normal user would notice or care about (new features, visible improvements, fixes to user-facing behavior). Completely OMIT internal/technical work: refactors, type-safety, tests, CI/CD, logging/monitoring (Sentry/PostHog), CORS, dependency upgrades, error-handling plumbing, and the release tooling itself. Group as short bullet points with a leading emoji. Keep it concise (max ~6 bullets). Do not invent features that are not in the PRs.'

          # Build the request body safely with jq (handles all quoting).
          jq -n --arg model "${{ inputs.model }}" \
                --arg sys "$SYSTEM" \
                --rawfile prs prs.txt \
            '{model: $model, temperature: 0.4,
              messages: [ {role:"system", content:$sys},
                          {role:"user", content:("Here are the merged PRs:\n\n" + $prs)} ]}' > body.json

          HTTP=$(curl -sS -o resp.json -w '%{http_code}' \
            https://models.github.ai/inference/chat/completions \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d @body.json)

          if [ "$HTTP" != "200" ]; then
            echo "GitHub Models request failed (HTTP $HTTP):"
            cat resp.json
            echo "If this is a 401/403/404, GitHub Models may not be enabled for this account/repo."
            exit 1
          fi

          jq -r '.choices[0].message.content' resp.json > notes.md

      - name: Write notes to the run summary
        run: |
          {
            echo "## 📣 Draft \"What's New\" (AI)"
            echo "_Generated by GitHub Models from PRs merged since \`${{ steps.collect.outputs.prev_tag }}\`. Review before publishing._"
            echo ""
            cat notes.md
          } >> "$GITHUB_STEP_SUMMARY"
