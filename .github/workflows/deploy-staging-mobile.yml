name: Staging Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./blotztask-mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.DEPLOY_ROBOT_ACCESS_TOKEN }}
          packager: npm

      - name: Build and Submit Preview
        run: eas build --platform android --profile preview --auto-submit --non-interactive
