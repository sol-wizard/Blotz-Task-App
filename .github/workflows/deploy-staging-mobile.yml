name: Staging Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        working-directory: ./blotztask-mobile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.DEPLOY_ROBOT_ACCESS_TOKEN }}

      - name: Build and Submit Preview
        run: eas build --platform android --profile preview --auto-submit --non-interactive
