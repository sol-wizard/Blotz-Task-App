name: Preview Next Release

# Keeps a single DRAFT GitHub Release ("Next release (unreleased)") updated with
# an AI-written, USER-FACING summary of what will ship in the next release.
#
# It reads the PRs merged since the last release — including the "Release note"
# section each PR author fills in (see .github/pull_request_template.md) — and
# uses GitHub Models to draft friendly "What's New" copy: it omits work marked
# internal or hidden-in-production, and tags beta features as "(beta)".
#
# Refreshes on every merge to main, when a release is published, and on demand.
# Uses only the built-in token (no API key, no cost). Builds/ships nothing.

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      model:
        description: "GitHub Models model"
        required: false
        default: "openai/gpt-4o"

permissions:
  contents: write
  models: read

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect PRs merged since the last release
        id: collect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          PREV_TAG=$(gh api "repos/$REPO/releases/latest" --jq '.tag_name' 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            SINCE=$(gh api "repos/$REPO/commits/$PREV_TAG" --jq '.commit.committer.date')
          else
            SINCE="1970-01-01T00:00:00Z"
          fi
          gh pr list --repo "$REPO" --state merged --base main --limit 100 \
            --json number,title,body,mergedAt \
            --jq "[.[] | select(.mergedAt > \"$SINCE\")] | sort_by(.mergedAt)
                  | .[] | \"#\(.number) \(.title)\n\(.body // \"\" | .[0:1500])\n---\"" > prs.txt
          echo "prev_tag=${PREV_TAG:-none}" >> "$GITHUB_OUTPUT"
          echo "Collected $(grep -c '^---$' prs.txt) PRs since ${PREV_TAG:-start}."

      - name: Summarize (English) and translate (Chinese) with GitHub Models
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MODEL="${{ inputs.model }}"; [ -z "$MODEL" ] && MODEL="openai/gpt-4o"

          # call_model <system-prompt> <user-prefix> <input-file> <output-file>
          call_model() {
            jq -n --arg model "$MODEL" --arg sys "$1" --arg prefix "$2" --rawfile data "$3" \
              '{model:$model, temperature:0.3,
                messages:[{role:"system",content:$sys},
                          {role:"user",content:($prefix+$data)}]}' > req.json
            HTTP=$(curl -sS -o resp.json -w '%{http_code}' \
              https://models.github.ai/inference/chat/completions \
              -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" -d @req.json)
            if [ "$HTTP" != "200" ]; then
              echo "GitHub Models request failed (HTTP $HTTP):"; cat resp.json; exit 1
            fi
            jq -r '.choices[0].message.content' resp.json > "$4"
          }

          SUMMARY_SYS='You write user-facing release notes ("What'\''s New") for BlotzTask, an ADHD-friendly mobile task manager. You receive the pull requests merged since the last release. Each PR may include a "Release note" line (a user-facing sentence) and a "Status" checklist. RULES: (1) If a PR is marked "Internal only" or "Hidden in production", OMIT it entirely. (2) If marked "Beta", place it under the "Beta features" section. (3) Prefer the PR'\''s "Release note" sentence for wording. (4) For PRs with no Release note section, judge conservatively from the title: include ONLY if it is clearly a user-visible feature or improvement, and when unsure, omit it. Never invent a feature or assume something is live in production. (5) Organize the notes under up to three markdown sections, in this order: "### ✨ New features", "### 🐛 Bug fixes", "### 🧪 Beta features". Place each item under the section that fits best (anything marked Beta goes under "Beta features"), as a short friendly bullet starting with a relevant emoji. OMIT any section that would be empty. Output only these sections, no preamble.'
          call_model "$SUMMARY_SYS" $'PRs merged since the last release:\n\n' prs.txt notes.md

          TRANSLATE_SYS='You are a professional localizer for BlotzTask, an ADHD-friendly mobile task manager. You receive user-facing English release notes in markdown and translate them into natural, friendly Simplified Chinese (简体中文). RULES: (1) Keep the markdown structure and every emoji exactly as-is. (2) Translate the section headings too: "### ✨ New features" -> "### ✨ 新功能", "### 🐛 Bug fixes" -> "### 🐛 问题修复", "### 🧪 Beta features" -> "### 🧪 测试版功能". (3) Keep any "(beta)" tag as "（测试版）". (4) Do not add, drop, merge, or reorder any bullet — translate one-to-one. (5) Use natural product-copy tone, not literal machine translation. Output only the translated markdown, no preamble.'
          call_model "$TRANSLATE_SYS" $'Translate these release notes into Simplified Chinese:\n\n' notes.md notes.zh.md

      - name: Upsert the draft with the AI summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          {
            echo "> 🟡 **Preview of the next release** — AI-drafted from merged PRs, auto-updated on every merge to main. Review before publishing."
            echo "> Since: \`${{ steps.collect.outputs.prev_tag }}\`"
            echo ""
            echo "## 🇬🇧 English"
            echo ""
            cat notes.md
            echo ""
            echo "---"
            echo ""
            echo "## 🇨🇳 中文"
            echo ""
            cat notes.zh.md
          } > out.md
          ID=$(gh api "repos/$REPO/releases" --jq '.[] | select(.draft and .name=="Next release (unreleased)") | .id' | head -n1)
          if [ -n "$ID" ]; then
            gh api -X PATCH "repos/$REPO/releases/$ID" -f body="$(cat out.md)" >/dev/null
            echo "Updated existing draft (id=$ID)."
          else
            gh api -X POST "repos/$REPO/releases" \
              -F draft=true -f name="Next release (unreleased)" \
              -f tag_name=next -f target_commitish=main -f body="$(cat out.md)" >/dev/null
            echo "Created draft."
          fi
